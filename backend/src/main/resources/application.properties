spring.application.name=backend
server.port=8080

app.frontend-origins=${FRONTEND_ORIGINS:http://localhost:4200,http://localhost,capacitor://localhost,http://192.168.1.103:4200}
app.ml-service-base-url=${ML_SERVICE_BASE_URL:http://localhost:8000}
app.denmark-center-lat=56.2639
app.denmark-center-lng=9.5018
app.country-code=dk
app.jwt-secret=${APP_JWT_SECRET:change-this-demo-secret-key-change-this-demo-secret-key}
app.jwt-expiration-ms=${APP_JWT_EXPIRATION_MS:86400000}

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/road_assistant}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:root}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:com.mysql.cj.jdbc.Driver}
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.open-in-view=false
